name: Deploy

on:
  push:
    branches: ["main"]

jobs:
  publish:
    name: Publish to S3
    runs-on: ubuntu-latest
    steps:
      - name: Information
        run: echo "Deploying datasets update"

      - name: Code checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.2

      - name: Compile datasets file
        run: bun install && bun run compile

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AMAZON_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AMAZON_SECRET_KEY }}

      - name: Deploy to S3
        run: |
          aws s3 sync public s3://datasets.surrealdb.com --delete --cache-control "public, max-age=1800"
          aws s3 cp out/datasets.json s3://datasets.surrealdb.com/datasets.json --cache-control "public, max-age=300"
