name: Deploy

on:
  push:
    branches: ["main"]

jobs:
  publish:
    name: Publish to S3
    runs-on: ubuntu-latest
    steps:
      - name: Information
        run: echo "Deploying datasets update"

      - name: Code checkout
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.2

      - name: Compile datasets file
        run: bun install && bun run compile

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AMAZON_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AMAZON_SECRET_KEY }}
      
      - name: Deploy to S3
        run: aws s3 sync dist s3://datasets.surrealdb.com --delete
